[tools]
python = "3.12"

[settings]
python.uv_venv_auto = "create|source"

[tasks.setup]
description = "Install Python 3.12, sync .venv (pyspark, jupyterlab, …)"
run = ["mise install", "uv sync"]

[tasks.lint]
description = "Run ruff linter and formatter"
run = ["uv run ruff check --fix .", "uv run ruff format ."]

[tasks.test]
description = "Run pytest"
run = "uv run pytest"

[tasks.spark-app]
description = "Run a Spark app via entrypoint"
raw_args = true
run = "uv run python -m spark_app.entrypoint"

[tasks."catalog:apply"]
description = "Apply Iceberg DDL from catalog/ddl/"
raw_args = true
run = "uv run python -m spark_app.catalog.apply"

[tasks."catalog:drop"]
description = "Drop Iceberg table (catalog/ddl target)"
raw_args = true
run = "uv run python -m spark_app.catalog.apply --drop"

[tasks."sample:ingest"]
description = "Run sample.orders_ingest (requires infra:up + catalog:apply)"
run = """
uv run python -m spark_app.entrypoint \
  --app_name sample.orders_ingest \
  --env local \
  --ymd $(date +%Y-%m-%d) \
  --hms $(date +%H%M%S)
"""

[tasks."infra:up"]
description = "Start local MinIO stack (docker compose)"
run = "docker compose -f docker/compose.yml --env-file .env.local up -d"

[tasks."infra:down"]
description = "Stop local MinIO stack"
run = "docker compose -f docker/compose.yml --env-file .env.local down"

[tasks.sample]
description = "Run sample.orders_summary (requires infra:up)"
run = """
uv run python -m spark_app.entrypoint \
  --app_name sample.orders_summary \
  --env local \
  --ymd $(date +%Y-%m-%d) \
  --hms $(date +%H%M%S)
"""

[tasks.clean-cache]
description = "Remove __pycache__ and test/lint cache directories"
run = "rm -rf .pytest_cache .ruff_cache .mypy_cache && find spark_app tests -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true"

[tasks.jupyter]
description = "Start JupyterLab (notebooks/)"
run = "uv run jupyter lab --notebook-dir=notebooks"
