[tools]
python = "3.12"

[settings]
python.uv_venv_auto = "create|source"

[tasks.setup]
description = "Install Python 3.12, sync .venv (pyspark, duckdb, jupyterlab, …)"
run = ["mise install", "uv sync"]

[tasks.lint]
description = "Run ruff linter and formatter"
run = ["uv run ruff check --fix .", "uv run ruff format ."]

[tasks.test]
description = "Run pytest"
run = "uv run pytest"

[tasks.spark-app]
description = "Run a Spark app via entrypoint"
raw_args = true
run = "uv run python -m spark_app.entrypoint"

[tasks.sample]
description = "Run sample.hello_world app locally"
run = """
uv run python -m spark_app.entrypoint \
  --app_name sample.hello_world \
  --env local \
  --ymd $(date +%Y-%m-%d) \
  --hms $(date +%H%M%S)
"""

[tasks.clean-cache]
description = "Remove __pycache__ and test/lint cache directories"
run = "rm -rf .pytest_cache .ruff_cache .mypy_cache && find spark_app tests -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true"

[tasks.jupyter]
description = "Start JupyterLab (notebooks/)"
run = "uv run jupyter lab --notebook-dir=notebooks"

