catalog:
  name: iceberg

datasets:
  # S3 bucket name matches --env (local, homelab, aws). Endpoint/credentials in .env.{env}.
  warehouse: "s3a://local"

spark:
  master: "local[*]"
  configs:
    spark.sql.shuffle.partitions: "4"
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.iceberg: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg.type: rest
    spark.sql.catalog.iceberg.uri: "${ICEBERG_REST_URI}"
    spark.sql.catalog.iceberg.warehouse: "s3a://local"
    spark.sql.catalog.iceberg.io-impl: org.apache.iceberg.aws.s3.S3FileIO
    spark.sql.catalog.iceberg.s3.endpoint: "${S3A_ENDPOINT}"
    spark.sql.catalog.iceberg.s3.path-style-access: "true"
    spark.sql.catalog.iceberg.s3.region: us-east-1
    spark.sql.catalog.iceberg.s3.access-key-id: "${S3A_ACCESS_KEY}"
    spark.sql.catalog.iceberg.s3.secret-access-key: "${S3A_SECRET_KEY}"
    spark.hadoop.fs.s3a.endpoint: "${S3A_ENDPOINT}"
    spark.hadoop.fs.s3a.access.key: "${S3A_ACCESS_KEY}"
    spark.hadoop.fs.s3a.secret.key: "${S3A_SECRET_KEY}"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.connection.ssl.enabled: "false"
    spark.hadoop.fs.s3a.aws.credentials.provider: org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
    # PySpark 4.1 + Iceberg 1.11. hadoop-aws 3.3.x breaks s3a with NumberFormatException "60s".
    spark.jars.packages: "org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,org.apache.iceberg:iceberg-aws-bundle:1.11.0,org.apache.hadoop:hadoop-aws:3.4.1,com.amazonaws:aws-java-sdk-bundle:1.12.367"
